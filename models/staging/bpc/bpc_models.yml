version: 2

models:

  # =========================
  # SAFETY
  # =========================
  - name: stg_bpc__safety
    description: "BPC Safety incident data at event level."
    columns:
      - name: safety_key
        description: "Surrogate key for safety incidents."
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error

    tests:
      - duplicate_threshold:
          column_name: safety_key
          max_duplicates: 40
          config:
            severity: error

  # =========================
  # ENVIRONMENT
  # =========================
  - name: stg_bpc__environment
